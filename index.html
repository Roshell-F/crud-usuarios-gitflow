<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Usuarios PRO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h1>Gestión de Usuarios</h1>

    <!-- FORMULARIO -->
    <div class="card">
        <form id="userForm">
            <input type="hidden" id="userId">

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="name" placeholder="Ej: Juan Pérez" required>
            </div>

            <div class="form-group">
                <label>Correo</label>
                <input type="email" id="email" placeholder="Ej: correo@gmail.com" required>
            </div>

            <button type="submit" class="btn-primary">Guardar Usuario</button>
        </form>
    </div>

    <!-- TABLA -->
    <div class="card">
        <h2>Lista de Usuarios</h2>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="userList"></tbody>
        </table>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
